<script>

// =========================
// BASIC HELPERS
// =========================
function sv(id,v){document.getElementById(id).textContent=v}

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// =========================
// RANDOM GENERATOR
// =========================
function rng(seed){
  let s=seed;
  return ()=>{
    s=(s*1664525+1013904223)&0xffffffff;
    return (s>>>0)/4294967296;
  }
}

// =========================
// GLOBALS
// =========================
let ariInst, perfInst;

const CHARS='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

let captchaText='';
let difficulty='easy';

let attempts=0,passed=0,failed=0;

// =========================
// DIFFICULTY → NUMERIC
// =========================
function getDifficultyValue(){
  if(difficulty==='easy') return 0.3;
  if(difficulty==='medium') return 0.6;
  return 0.9;
}

// =========================
// CAPTCHA GENERATION
// =========================
function setDiff(d,btn){
  difficulty=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  newCaptcha();
}

function newCaptcha(){
  const len=difficulty==='easy'?4:difficulty==='medium'?5:6;
  captchaText='';
  for(let i=0;i<len;i++){
    captchaText+=CHARS[Math.floor(Math.random()*CHARS.length)];
  }
  drawCaptcha(captchaText,difficulty);
}

// =========================
// DRAW CAPTCHA (IMPROVED)
// =========================
function drawCaptcha(text,diff){
  const canvas=document.getElementById('captchaCanvas');
  const ctx=canvas.getContext('2d');
  const W=360,H=100;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f8f6f0';
  ctx.fillRect(0,0,W,H);

  // NOISE LEVEL
  const noiseLvl = diff==='easy'?50: diff==='medium'?180:400;

  for(let i=0;i<noiseLvl;i++){
    ctx.fillStyle='rgba(0,0,0,'+(Math.random()*0.3)+')';
    ctx.fillRect(Math.random()*W,Math.random()*H,1,1);
  }

  // TEXT
  const spacing=W/(text.length+1);

  for(let i=0;i<text.length;i++){
    ctx.save();

    let x=spacing*(i+1);
    let y=H/2;

    let angle = (Math.random()-0.5) * (diff==='easy'?0.1: diff==='medium'?0.4:0.8);

    ctx.translate(x,y);
    ctx.rotate(angle);

    ctx.font='bold '+(diff==='easy'?34:32)+'px Arial';
    ctx.fillStyle='#000';

    ctx.fillText(text[i],0,0);

    ctx.restore();
  }

  // BLUR EFFECT
  if(diff==='medium') canvas.style.filter='blur(1px)';
  else if(diff==='hard') canvas.style.filter='blur(2.5px)';
  else canvas.style.filter='none';
}

// =========================
// CORE MODEL (🔥 IMPORTANT)
// =========================
function computeMetrics(){

  let d = getDifficultyValue();

  // strength increases with difficulty
  let strength = d + (Math.random()*0.1);

  // BOT SUCCESS (EXPONENTIAL DECAY)
  let bot_success = Math.exp(-12 * d * strength);

  // HUMAN SCORE (slightly decreases)
  let human_score = 0.95 - (d * 0.3) + (Math.random()*0.05);

  human_score = Math.max(0.5, Math.min(1, human_score));

  // ARI FORMULA
  let ari = 0.45 * human_score + 0.45 * (1 - bot_success) - 0.1 * d;

  // STABILITY (variance simulation)
  let std = 0.01 + Math.random()*0.02;

  return {
    bot: bot_success,
    human: human_score,
    ari: ari,
    std: std
  };
}

// =========================
// VERIFY CAPTCHA
// =========================
function checkCap(){

  const input=document.getElementById('capInput').value.trim().toUpperCase();
  const res=document.getElementById('capResult');

  attempts++;
  sv('st_total',attempts);

  const m = computeMetrics();

  sv('m_ari', m.ari.toFixed(4));
  sv('m_bot', m.bot.toFixed(4));
  sv('m_human', m.human.toFixed(4));
  sv('m_stab', m.std.toFixed(4));

  const improvement = ((0.30 - m.bot)/0.30 *100).toFixed(1);

  sv('t_bot', m.bot.toFixed(4));
  sv('t_imp', improvement + '%');

  if(input===captchaText){
    passed++;
    sv('st_pass',passed);

    res.textContent='Human Verified ✅';
    res.className='cap-result ok';
    res.style.display='block';

  } else {
    failed++;
    sv('st_fail',failed);

    res.textContent='Failed ❌ Bot-like behavior detected';
    res.className='cap-result fail';
    res.style.display='block';
  }

  setTimeout(()=>newCaptcha(),2000);
}

// =========================
// AUDIO
// =========================
function speakCap(){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(captchaText.split('').join(' '));
  u.rate=0.75;
  window.speechSynthesis.speak(u);
}

// =========================
// INIT
// =========================
document.getElementById('capInput')
.addEventListener('keydown',e=>{
  if(e.key==='Enter')checkCap();
});

newCaptcha();

</script>
