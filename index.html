<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Advanced CAPTCHA Framework</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0}
.container{max-width:600px;margin:40px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
h1{text-align:center}
canvas{border:1px solid #ccc;border-radius:6px;width:100%}
input{width:100%;padding:10px;margin-top:10px;font-size:16px}
button{padding:10px;margin-top:10px;width:100%;cursor:pointer}
.result{margin-top:15px;padding:10px;border-radius:6px}
.ok{background:#e6f7e6;color:#1a7f1a}
.fail{background:#fdeaea;color:#a11}
.bar{height:6px;background:#ddd;border-radius:4px;margin-top:4px}
.bar-fill{height:100%;border-radius:4px}
</style>
</head>

<body>

<div class="container">
<h1>Adaptive CAPTCHA System</h1>

<select id="difficulty" onchange="newCaptcha()">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<canvas id="captchaCanvas" width="360" height="100"></canvas>

<input id="capInput" placeholder="Enter CAPTCHA"/>

<button onclick="checkCap()">Verify</button>
<button onclick="newCaptcha()">New CAPTCHA</button>

<div id="result" class="result" style="display:none"></div>
</div>

<script>
const CHARS='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
let captchaText='';
let attempts=0;

function newCaptcha(){
  const diff=document.getElementById('difficulty').value;
  const len= diff==='easy'?4: diff==='medium'?5:6;

  captchaText='';
  for(let i=0;i<len;i++){
    captchaText+=CHARS[Math.floor(Math.random()*CHARS.length)];
  }

  drawCaptcha(captchaText,diff);
  document.getElementById('capInput').value='';
  document.getElementById('result').style.display='none';
}

function drawCaptcha(text,diff){
  const canvas=document.getElementById('captchaCanvas');
  const ctx=canvas.getContext('2d');
  const W=360,H=100;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f8f6f0';
  ctx.fillRect(0,0,W,H);

  let noise = diff==='easy'?50: diff==='medium'?150:300;

  for(let i=0;i<noise;i++){
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.fillRect(Math.random()*W,Math.random()*H,2,2);
  }

  const spacing=W/(text.length+1);

  for(let i=0;i<text.length;i++){
    ctx.save();
    ctx.translate(spacing*(i+1),H/2);
    ctx.rotate((Math.random()-0.5)*(diff==='hard'?0.6:0.2));
    ctx.font="bold 32px Arial";
    ctx.fillStyle="#222";
    ctx.fillText(text[i],-10,10);
    ctx.restore();
  }
}

// ===== AI MODELS =====

function simulateAgents(difficulty){
  let d = difficulty==='easy'?0.3: difficulty==='medium'?0.6:0.85;

  // Multi-agent bots
  let weakBot = Math.exp(-3*d);
  let strongBot = Math.exp(-8*d);
  let bot = (weakBot + strongBot)/2;

  // Human model
  let human = 0.92 - 0.25*Math.pow(d,1.2);
  human += (Math.random()-0.5)*0.05;

  return {
    bot: Math.max(0.05,Math.min(0.9,bot)).toFixed(2),
    human: Math.max(0.6,Math.min(0.95,human)).toFixed(2)
  };
}

function computeARI(human, bot, difficulty){
  let d = difficulty==='easy'?0.3: difficulty==='medium'?0.6:0.85;
  let ari = 0.45*human + 0.45*(1-bot) - 0.1*d;
  return Math.max(0,Math.min(1,ari)).toFixed(3);
}

function getVerdict(bot,human){
  if(bot>0.6) return "⚠️ Weak CAPTCHA (Bots likely pass)";
  if(bot<0.2 && human>0.75) return "✅ Strong & Usable";
  if(human<0.7) return "⚠️ Too Hard for Humans";
  return "⚖️ Balanced Challenge";
}

// ===== MAIN LOGIC =====

function checkCap(){
  const input=document.getElementById('capInput').value.toUpperCase();
  const diff=document.getElementById('difficulty').value;
  const res=document.getElementById('result');

  const sim = simulateAgents(diff);
  const ari = computeARI(parseFloat(sim.human),parseFloat(sim.bot),diff);
  const verdict = getVerdict(parseFloat(sim.bot),parseFloat(sim.human));

  let responseTime = (2 + (diff==='easy'?1: diff==='medium'?2:3) + Math.random()).toFixed(2);

  if(input===captchaText){
    res.className="result ok";
    res.innerHTML = `
      ✅ Verified — Human<br>
      👤 Human success: ${sim.human}<br>
      🤖 Bot success: ${sim.bot}<br>
      📊 ARI: ${ari}<br>
      🧠 Verdict: ${verdict}<br>
      ⏱ Time: ${responseTime}s

      <div>Human</div>
      <div class="bar"><div class="bar-fill" style="width:${sim.human*100}%;background:#1D9E75"></div></div>

      <div>Bot</div>
      <div class="bar"><div class="bar-fill" style="width:${sim.bot*100}%;background:#D85A30"></div></div>
    `;
  } else {
    res.className="result fail";
    res.innerHTML = `
      ❌ Incorrect (Text: ${captchaText})<br>
      👤 Human success: ${sim.human}<br>
      🤖 Bot success: ${sim.bot}<br>
      📊 ARI: ${ari}<br>
      🧠 Verdict: ${verdict}
    `;
  }

  res.style.display="block";

  // 🔥 Adaptive difficulty
  if(sim.bot > 0.4){
    document.getElementById('difficulty').value='hard';
  } else if(sim.human < 0.7){
    document.getElementById('difficulty').value='easy';
  }

  setTimeout(newCaptcha,2000);
}

newCaptcha();
</script>

</body>
</html>
