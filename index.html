<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAPTCHA Framework — Demo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#ffffff;
  --text:#1a1a1a;
  --border:rgba(0,0,0,0.12);
  --blue:#378ADD;
}

body{
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  display:flex;
  border-bottom:1px solid var(--border);
  padding:10px;
}

nav button{
  background:none;
  border:none;
  padding:10px 15px;
  cursor:pointer;
}

nav button.active{
  border-bottom:2px solid black;
}

/* PAGE */
.page{
  display:none;
  padding:20px;
}

.page.active{
  display:block;
}

/* CONTROLS */
.controls{
  margin:20px 0;
}

.metric{
  padding:10px;
  border:1px solid var(--border);
  margin-top:10px;
  border-radius:6px;
}

/* CAPTCHA */
.captcha-wrap{
  max-width:400px;
  margin:auto;
  padding:20px;
  border:1px solid var(--border);
  border-radius:10px;
}

canvas{
  display:block;
  margin-bottom:10px;
  border:1px solid var(--border);
}

.cap-input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  font-size:16px;
}

.cap-btn,.cap-submit{
  padding:10px;
  width:100%;
  margin-top:5px;
  cursor:pointer;
  border:none;
  background:black;
  color:white;
  border-radius:6px;
}

.cap-result{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <button class="active" onclick="showPage('sim',this)">Simulation</button>
  <button onclick="showPage('cap',this)">CAPTCHA</button>
</nav>

<!-- SIMULATION -->
<div class="page active" id="sim">
  <h2>Simulation Dashboard</h2>

  <div class="controls">
    <label>Steps: <span id="v_steps">1000</span></label>
    <input type="range" min="500" max="5000" step="500" value="1000"
      oninput="updateSteps(this.value)">
    <br><br>
    <button onclick="runSim()">Run Simulation</button>
  </div>

  <div class="metric">
    Mean ARI: <span id="m_ari">0.70</span>
  </div>

  <canvas id="chart" height="100"></canvas>
</div>

<!-- CAPTCHA -->
<div class="page" id="cap">
  <h2>CAPTCHA Tester</h2>

  <div class="captcha-wrap">
    <canvas id="captchaCanvas" width="300" height="100"></canvas>

    <input id="capInput" class="cap-input" placeholder="Enter CAPTCHA">

    <button class="cap-btn" onclick="newCaptcha()">New CAPTCHA</button>
    <button class="cap-submit" onclick="checkCaptcha()">Verify</button>

    <div class="cap-result" id="result"></div>
  </div>
</div>

<script>
/* PAGE SWITCH */
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

/* SIMULATION */
let chart;

function updateSteps(val){
  document.getElementById("v_steps").innerText = val;
}

function runSim(){
  const steps = 50;
  let data = [];
  let val = 0.6;

  for(let i=0;i<steps;i++){
    val += (0.8 - val)*0.05 + (Math.random()-0.5)*0.02;
    data.push(val.toFixed(3));
  }

  document.getElementById("m_ari").innerText =
    (data.reduce((a,b)=>a+parseFloat(b),0)/data.length).toFixed(4);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:data.map((_,i)=>i),
      datasets:[{
        label:"ARI",
        data:data
      }]
    }
  });
}

/* CAPTCHA */
const CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
let captcha = "";

function newCaptcha(){
  captcha="";
  for(let i=0;i<5;i++){
    captcha += CHARS[Math.floor(Math.random()*CHARS.length)];
  }

  drawCaptcha();
}

function drawCaptcha(){
  const canvas=document.getElementById("captchaCanvas");
  const ctx=canvas.getContext("2d");

  ctx.clearRect(0,0,300,100);
  ctx.font="30px Arial";

  for(let i=0;i<captcha.length;i++){
    ctx.fillText(captcha[i],50+i*40,60);
  }
}

function checkCaptcha(){
  const input=document.getElementById("capInput").value.toUpperCase();
  const res=document.getElementById("result");

  if(input===captcha){
    res.innerText="✅ Correct!";
  }else{
    res.innerText="❌ Wrong! It was "+captcha;
  }

  newCaptcha();
}

/* INIT */
newCaptcha();
runSim();
</script>

</body>
</html>
