<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAPTCHA AI Framework</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
nav{display:flex;background:#222;color:#fff}
nav button{flex:1;padding:15px;background:none;border:none;color:#fff;cursor:pointer}
nav button.active{background:#444}

.page{display:none;padding:20px}
.page.active{display:block}

.card{background:#fff;padding:15px;margin:10px 0;border-radius:8px}

canvas{max-width:100%}
input,button{padding:8px;margin:5px}
.diff-btn{margin-right:5px}
.cap-result.ok{color:green}
.cap-result.fail{color:red}
</style>
</head>

<body>

<nav>
<button class="active" onclick="showPage('sim',this)">Dashboard</button>
<button onclick="showPage('cap',this)">CAPTCHA</button>
</nav>

<!-- DASHBOARD -->
<div id="sim" class="page active">
<h2>Simulation Dashboard</h2>

<div class="card">
Steps <input id="steps" value="5000">
Target ARI <input id="target" value="80">
<button onclick="runSim()">Run</button>
</div>

<div class="card">
<p>Mean ARI: <span id="ari">-</span></p>
<p>Bot Success: <span id="bot">-</span></p>
<p>Human Score: <span id="human">-</span></p>
</div>

<div class="card">
<canvas id="chart1"></canvas>
</div>

</div>

<!-- CAPTCHA -->
<div id="cap" class="page">
<h2>CAPTCHA Tester</h2>

<div class="card">
<button class="diff-btn" onclick="setDiff('easy',this)">Easy</button>
<button class="diff-btn" onclick="setDiff('medium',this)">Medium</button>
<button class="diff-btn" onclick="setDiff('hard',this)">Hard</button>
</div>

<div class="card">
<canvas id="captchaCanvas" width="300" height="100"></canvas><br>
<input id="input" placeholder="Enter CAPTCHA">
<button onclick="check()">Submit</button>
<button onclick="newCaptcha()">Refresh</button>
<p id="result"></p>
</div>

<div class="card">
<p>Total: <span id="t">0</span></p>
<p>Human: <span id="h">0</span></p>
<p>Bot: <span id="b">0</span></p>
<p>ARI: <span id="ari2">0</span></p>
</div>

</div>

<script>

/* PAGE */
function showPage(id,btn){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'))
document.getElementById(id).classList.add('active')
btn.classList.add('active')
}

/* SIMULATION */
let chart;

function runSim(){
let steps=+document.getElementById('steps').value
let target=+document.getElementById('target').value/100

let ari=0.6,data=[]

for(let i=0;i<steps;i++){
ari += (target-ari)*0.01 + (Math.random()-0.5)*0.01
ari=Math.max(0.5,Math.min(0.95,ari))

if(i%100==0) data.push(ari.toFixed(3))
}

let mean=(data.reduce((a,b)=>+a+ +b,0)/data.length).toFixed(4)
let bot=(0.05+Math.random()*0.02).toFixed(4)
let human=(0.85+Math.random()*0.05).toFixed(4)

document.getElementById('ari').innerText=mean
document.getElementById('bot').innerText=bot
document.getElementById('human').innerText=human

if(chart) chart.destroy()
chart=new Chart(document.getElementById('chart1'),{
type:'line',
data:{labels:data.map((_,i)=>i),datasets:[{label:'ARI',data:data}]}
})
}

/* CAPTCHA */
let text='',difficulty='easy'
let total=0,human=0,bot=0

function setDiff(d,btn){
difficulty=d
document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'))
btn.classList.add('active')
newCaptcha()
}

function newCaptcha(){
let len=difficulty==='easy'?4:difficulty==='medium'?5:6
let chars="ABCDEFGHJKLMNP23456789"
text=''

for(let i=0;i<len;i++){
text+=chars[Math.floor(Math.random()*chars.length)]
}

draw()
document.getElementById('input').value=''
document.getElementById('result').innerText=''
}

function draw(){
let c=document.getElementById('captchaCanvas')
let ctx=c.getContext('2d')

ctx.clearRect(0,0,300,100)
ctx.fillStyle="#fff"
ctx.fillRect(0,0,300,100)

let noise = difficulty==='easy'?50: difficulty==='medium'?150:300
let blur = difficulty==='easy'?0: difficulty==='medium'?1:2

/* noise */
for(let i=0;i<noise;i++){
ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(Math.random()*300,Math.random()*100,2,2)
}

/* text */
ctx.font="30px Arial"
for(let i=0;i<text.length;i++){
ctx.save()
ctx.translate(40+i*40,60)
ctx.rotate((Math.random()-0.5)*0.5)
ctx.fillText(text[i],0,0)
ctx.restore()
}

/* blur */
if(blur>0){
let imgData=ctx.getImageData(0,0,300,100)
for(let i=0;i<imgData.data.length;i+=4){
imgData.data[i]+=blur*5
}
ctx.putImageData(imgData,0,0)
}
}

function check(){
let val=document.getElementById('input').value.toUpperCase()
total++

if(val===text){
human++
document.getElementById('result').innerText="Human ✅"
}else{
bot++
document.getElementById('result').innerText="Bot ❌ ("+text+")"
}

/* ARI formula */
let human_score=human/total || 0
let bot_success=bot/total || 0
let ari = human_score * (1 - bot_success)

document.getElementById('t').innerText=total
document.getElementById('h').innerText=human
document.getElementById('b').innerText=bot
document.getElementById('ari2').innerText=ari.toFixed(3)

setTimeout(newCaptcha,1500)
}

/* INIT */
newCaptcha()
runSim()

</script>

</body>
</html>
